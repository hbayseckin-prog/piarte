{# Ödeme formları: öğrenci ara + altta öneriler; seçim gizli alana yazılır. Kaynak olarak name'siz bir <select> kullanın. #}
<style id="piarte-student-combo-styles">
.piarte-student-combo-wrap{position:relative;margin-bottom:4px}
.piarte-student-suggestions{display:none;margin:4px 0 0;padding:4px 0;list-style:none;position:absolute;left:0;right:0;top:100%;z-index:50;max-height:min(280px,40vh);overflow-y:auto;background:#fff;border:1px solid var(--border, #e5e7eb);border-radius:12px;box-shadow:0 12px 32px -8px rgba(15,23,42,.18)}
.piarte-student-suggestions.is-open{display:block}
.piarte-student-suggestions li{margin:0}
.piarte-student-suggestions button{display:block;width:100%;text-align:left;padding:10px 14px;font-size:15px;font-family:inherit;color:#0f172a;background:transparent;border:none;cursor:pointer;border-radius:8px;line-height:1.35}
.piarte-student-suggestions button:hover,.piarte-student-suggestions button:focus{background:#f1f5f9;outline:none}
.piarte-student-suggestions .hint{padding:10px 14px;font-size:13px;color:#64748b}
</style>
<script>
(function () {
  function norm(s) {
    return (s || '').toLocaleLowerCase('tr-TR');
  }

  function rowsFromSelect(sourceSelect) {
    var rows = [];
    var seen = new Set();
    var opts = Array.from(sourceSelect.options);
    for (var i = 0; i < opts.length; i++) {
      var o = opts[i];
      if (!o.value) continue;
      if (seen.has(o.value)) continue;
      seen.add(o.value);
      rows.push({
        value: o.value,
        label: (o.textContent || '').trim(),
        fn: o.getAttribute('data-fn') || '',
        ln: o.getAttribute('data-ln') || ''
      });
    }
    return rows;
  }

  function matches(rows, q) {
    var out = [];
    if (q.length < 3) return out;
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var fn = norm(r.fn);
      var ln = norm(r.ln);
      var full = (fn + ' ' + ln).trim();
      if (fn.indexOf(q) === 0 || ln.indexOf(q) === 0 || full.indexOf(q) === 0) out.push(r);
    }
    return out;
  }

  window.piarteStudentSearchCombobox = function (opts) {
    var searchInput = opts.searchInput;
    var hiddenInput = opts.hiddenInput;
    var panel = opts.suggestionsPanel;
    var source = opts.sourceSelect;
    var initId = opts.initialStudentId == null || opts.initialStudentId === '' ? '' : String(opts.initialStudentId);
    if (!searchInput || !hiddenInput || !panel || !source) return;

    var rows = rowsFromSelect(source);
    var silentInput = false;
    var blurTimer;

    function openPanel(open) {
      panel.classList.toggle('is-open', !!open);
    }

    function renderSuggestions() {
      var q = norm((searchInput.value || '').trim());
      panel.innerHTML = '';

      if (q.length < 3) return;

      var hits = matches(rows, q);
      if (hits.length === 0) {
        var liEmpty = document.createElement('li');
        liEmpty.className = 'hint';
        liEmpty.textContent = 'Eşleşen öğrenci yok; yazdığınızı kısaltıp deneyin.';
        panel.appendChild(liEmpty);
        return;
      }

      for (var i = 0; i < hits.length; i++) {
        var r = hits[i];
        var li = document.createElement('li');
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = r.label;
        btn.setAttribute('data-id', r.value);
        btn.addEventListener('click', function (ev) {
          ev.preventDefault();
          choose(this.getAttribute('data-id'), this.textContent);
        });
        li.appendChild(btn);
        panel.appendChild(li);
      }
    }

    function choose(id, label) {
      hiddenInput.value = id;
      silentInput = true;
      searchInput.value = label || '';
      silentInput = false;
      openPanel(false);
      hiddenInput.setCustomValidity('');
    }

    function syncFromInitial() {
      if (!initId) return;
      for (var i = 0; i < rows.length; i++) {
        if (rows[i].value === initId) {
          choose(rows[i].value, rows[i].label);
          return;
        }
      }
    }

    searchInput.addEventListener('input', function () {
      if (silentInput) return;
      hiddenInput.value = '';
      hiddenInput.setCustomValidity('');
      var q = norm((searchInput.value || '').trim());
      if (q.length >= 3) {
        renderSuggestions();
        openPanel(true);
      } else {
        panel.innerHTML = '';
        openPanel(false);
      }
    });

    searchInput.addEventListener('focus', function () {
      clearTimeout(blurTimer);
      var q = norm((searchInput.value || '').trim());
      if (q.length >= 3) {
        renderSuggestions();
        openPanel(true);
      }
    });

    searchInput.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        openPanel(false);
        searchInput.blur();
      }
    });

    searchInput.addEventListener('blur', function () {
      blurTimer = setTimeout(function () {
        openPanel(false);
      }, 160);
    });

    panel.addEventListener('mousedown', function (e) {
      e.preventDefault();
    });

    var form = searchInput.closest('form');
    if (form) {
      form.addEventListener('submit', function (e) {
        if (!hiddenInput.value) {
          e.preventDefault();
          hiddenInput.setCustomValidity('Listeden bir öğrenci seçin.');
          hiddenInput.reportValidity();
        }
      });
    }

    syncFromInitial();
    /* İlk yüklemede öneri paneli kapalı — focus veya yazınca açılır */
    openPanel(false);
  };

})();
</script>
